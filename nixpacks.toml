[phases.install]
cmds = ["cd backend && npm install --legacy-peer-deps"]

[phases.build]
cmds = [
  "cd backend && npx prisma generate",
  "cd backend && npx prisma db push --accept-data-loss",
  "cd backend && ADMIN_USERNAME=$ADMIN_USERNAME ADMIN_PASSWORD=$ADMIN_PASSWORD node scripts/seed-admin.js",
  "cd backend && npx nest build"
]

[start]
cmd = "cd backend && npm run start:prod"
